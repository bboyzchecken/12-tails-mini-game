<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>12Tails Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #1a1a2e;
        overflow: hidden;
        overscroll-behavior: none;
      }
      /* Pin the page to the viewport: on phones `overflow: hidden` alone does
         NOT stop touch panning/rubber-banding, and 100vw/100vh can exceed the
         visual viewport. A fixed body has no root scroll to pan; inner overlays
         with their own overflow:auto still scroll. */
      body {
        position: fixed;
        inset: 0;
      }
      #game {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      /* Kill the inline-baseline gap under the WebGL canvas so it fills fully. */
      #game canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
