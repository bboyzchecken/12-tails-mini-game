# Local Postgres for 12tails-api development.
services:
  postgres:
    image: postgres:16-alpine
    container_name: 12tails-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: twelvetails
      TZ: Asia/Bangkok
    ports:
      - "5433:5432"   # host 5433 → container 5432 (5432 taken by another project locally)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d twelvetails"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
