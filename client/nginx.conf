server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — unknown routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets; models/textures live under /assets too.
    location /assets/ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }
}
