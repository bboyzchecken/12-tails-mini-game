# ══════════════════════════════════════════════════════════════════════════
#  12Tails — full stack in one compose. Build+run everything:
#     cp .env.example .env && docker compose up --build
#  Services: postgres · api (Go) · server (Socket.IO relay) · client (game).
#  web (Next.js) is scaffolded later — see the commented block at the bottom.
#  All config lives in ONE root .env, sectioned per service.
# ══════════════════════════════════════════════════════════════════════════
name: 12tails

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Bangkok
    ports:
      - "${POSTGRES_PORT}:5432" # host ${POSTGRES_PORT} → container 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api # self-contained Go module
    environment:
      ENV: ${ENV}
      API_PORT: 5000 # listen port INSIDE the container
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      # DB is reached over the compose network (service name), not the host port
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSLMODE: disable
    ports:
      - "${API_PORT}:5000" # host ${API_PORT} → container 5000
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: . # repo root — needs the npm workspace (shared/)
      dockerfile: server/Dockerfile
    environment:
      PORT: 3001
      CLIENT_ORIGIN: ${SERVER_CLIENT_ORIGIN}
    ports:
      - "${SERVER_PORT}:3001"

  client:
    build:
      context: . # repo root — needs the npm workspace (shared/)
      dockerfile: client/Dockerfile
      args:
        # Vite inlines these at BUILD time; point at the host-facing URLs
        VITE_SERVER_URL: ${VITE_SERVER_URL}
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${CLIENT_PORT}:80" # nginx serves the static build on 80
    depends_on:
      - server
      - api

  # ── WEB (Next.js landing + admin) — uncomment once /web exists ──
  # web:
  #   build:
  #     context: .
  #     dockerfile: web/Dockerfile
  #     args:
  #       NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
  #   ports:
  #     - "${WEB_PORT}:3000"
  #   depends_on:
  #     - api

volumes:
  pgdata:
